      - name: Create project spec
        run: |
          cat > project.yml << 'EOF'
          name: Xenon360
          options:
            bundleIdPrefix: com.yourname
            deploymentTarget:
              iOS: "18.0"
          targets:
            Xenon360:
              type: application
              platform: iOS
              sources:
                - path: Sources/Xenon360
                  optional: true
                - path: .
                  includes:
                    - "**/*.swift"
                  excludes:
                    - "Tests/**"
              info:
                path: Xenon360/Info.plist
                properties:
                  CFBundleDisplayName: Xenon360
                  MinimumOSVersion: "18.0"
          EOF
