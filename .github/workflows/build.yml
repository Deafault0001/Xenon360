      - name: Create project spec
        run: |
          cat > project.yml << 'EOF'
          name: Xenon360
          options:
            bundleIdPrefix: com.yourname
            deploymentTarget:
              iOS: "18.0"
          settings:
            SWIFT_VERSION: "5.9"
          targets:
            Xenon360:
              type: application
              platform: iOS
              sources:
                - path: .
                  includes:
                    - "*.swift"
                  excludes:
                    - "Package.swift"
                    - "XenonCPUTests.swift"
              info:
                path: Info.plist
                properties:
                  CFBundleDisplayName: Xenon360
                  MinimumOSVersion: "18.0"
                  UILaunchScreen: {}
          EOF
